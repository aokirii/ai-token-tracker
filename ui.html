<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Token Tracker</title>
<style>
  :root {
    --bg: #15151a;
    --card: #1e1e26;
    --card-hover: #24242e;
    --text: #f2f2f5;
    --muted: #8a8a99;
    --track: #2d2d38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Ubuntu", system-ui, sans-serif;
    padding: 20px;
    -webkit-user-select: none;
  }
  header {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 18px;
    position: relative;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .2px; }

  .menu-btn {
    background: none; border: none; color: var(--text); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 3px 6px; border-radius: 6px;
  }
  .menu-btn:hover { background: var(--card-hover); }
  .menu {
    position: absolute; top: 30px; left: 0; z-index: 10; min-width: 130px;
    background: var(--card); border: 1px solid var(--track); border-radius: 9px;
    padding: 5px; box-shadow: 0 8px 22px rgba(0,0,0,.45);
  }
  .menu.hidden { display: none; }
  .menu-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 10px; border-radius: 6px; font-size: 12.5px;
    color: var(--muted); cursor: pointer;
  }
  .menu-item:hover { background: var(--card-hover); color: var(--text); }
  .menu-item.active { color: var(--text); }
  .menu-item .tick { color: #3ea76f; font-size: 11px; }

  .hm-grid { display: flex; gap: 3px; margin: 8px 0 10px; }
  .hm-col { display: flex; flex-direction: column; gap: 3px; }
  .hm-cell { width: 13px; height: 13px; border-radius: 3px; background: var(--track); }
  .hm-cell.hm-empty { background: transparent; }
  .hm-l0 { background: var(--track); }
  .hm-l1 { background: #1e4d33; }
  .hm-l2 { background: #2d7a4f; }
  .hm-l3 { background: #3ea76f; }
  .hm-l4 { background: #5fd98f; }
  .hm-legend {
    display: flex; align-items: center; gap: 4px; justify-content: flex-end;
    font-size: 10px; color: var(--muted);
  }
  .hm-legend .hm-cell { width: 11px; height: 11px; }

  .hm-hours { display: flex; flex-direction: column; gap: 2px; margin: 8px 0 6px; }
  .hm-hrow { display: flex; gap: 2px; align-items: center; }
  .hm-hrow .hm-cell { width: 11px; height: 11px; border-radius: 2px; }
  .hm-day { width: 26px; font-size: 9.5px; color: var(--muted); }
  .hm-hlabel { width: 11px; font-size: 8px; color: var(--muted); text-align: center; }

  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: background .15s;
  }
  .card:hover { background: var(--card-hover); }

  .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .name { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 600; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .pct { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }

  .bar { height: 8px; background: var(--track); border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; border-radius: 6px; width: 0; transition: width .4s ease; }

  .row2 {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 11.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .badge {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 5px; background: var(--track); color: var(--muted);
  }
  .plan {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    padding: 2px 6px; border-radius: 5px; margin-left: 8px;
    background: rgba(255,255,255,.08); color: var(--muted);
  }
  footer { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 8px; }
  .err { color: #e5645a; font-size: 12px; text-align: center; padding: 20px; }
  .hint { font-size: 10.5px; color: #e0a23c; margin-top: 6px; }

  .ctx { margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--track); }
  .ctx-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 7px; font-size: 11.5px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .ctx-head .label { text-transform: uppercase; letter-spacing: .5px; font-size: 9.5px; }
  .ctx-parts {
    display: flex; gap: 13px; margin-bottom: 7px;
    font-size: 10.5px; font-variant-numeric: tabular-nums;
  }
  .ctx-parts .seg-label { display: flex; align-items: center; gap: 5px; }
  .ctx-parts .swatch { width: 8px; height: 8px; border-radius: 2px; }
  .bar.stacked { display: flex; }
  .seg { height: 100%; }
  .seg + .seg { box-shadow: inset 1px 0 0 var(--card); }
</style>
</head>
<body>
  <header>
    <button id="menu-btn" class="menu-btn" title="View">&#9776;</button>
    <h1>AI Token Tracker</h1>
    <div id="menu" class="menu hidden">
      <div class="menu-item" data-mode="live">Live<span class="tick"></span></div>
      <div class="menu-item" data-mode="offline">Offline<span class="tick"></span></div>
      <div class="menu-item" data-mode="heatmap">Heatmap<span class="tick"></span></div>
    </div>
  </header>
  <div id="cards"></div>
  <footer id="foot"></footer>

<script>
  function barColor(pct) {
    if (pct >= 90) return "#e5645a";
    if (pct >= 70) return "#e0a23c";
    return "#3ea76f";
  }

  // context-window token types: orange = input, green = cache, yellow = output
  const PART_COLORS = { input: "#e8843a", cache: "#3ea76f", output: "#e6cf4f" };
  function partColor(key) { return PART_COLORS[key] || "#888"; }

  function render(data) {
    const root = document.getElementById("cards");
    root.innerHTML = "";
    data.providers.forEach(p => {
      const pctShown = Math.min(p.pct, 100);
      const plan = p.plan
        ? `<span class="plan">${p.plan.toUpperCase()}</span>` : "";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row1">
          <div class="name"><span class="dot" style="background:${p.color}"></span>${p.name}${plan}</div>
          <div class="pct" style="color:${barColor(p.pct)}">${p.pct}%</div>
        </div>
        ${p.parts ? `
          <div class="ctx-parts">
            ${p.parts.map(part => `<span class="seg-label"><span class="swatch" style="background:${partColor(part.key)}"></span><span style="color:${partColor(part.key)}">${part.key} ${part.pct}%</span></span>`).join("")}
          </div>
          <div class="bar stacked">
            ${p.parts.map(part => `<div class="seg" style="width:${Math.min(part.pct, 100)}%;background:${partColor(part.key)}"></div>`).join("")}
          </div>`
        : `<div class="bar"><div class="fill" style="width:${pctShown}%;background:${barColor(p.pct)}"></div></div>`}
        <div class="row2">
          <span>${p.primary || ""}</span>
          <span>${p.extra || ""}</span>
        </div>
        <div class="row2"><span>${p.sub || ""}</span></div>
        ${p.hint ? `<div class="hint">${p.hint}</div>` : ""}
        ${(p.contexts || []).map(c => `
          <div class="ctx">
            <div class="ctx-head">
              <span class="label">Context${c.project ? ` · ${c.project}` : ""}</span>
              <span style="color:${barColor(c.pct)}">${c.pct}%</span>
            </div>
            <div class="ctx-parts">
              ${c.parts.map(part => `<span class="seg-label"><span class="swatch" style="background:${partColor(part.key)}"></span><span style="color:${partColor(part.key)}">${part.key} ${part.pct}%</span></span>`).join("")}
            </div>
            <div class="bar stacked">
              ${c.parts.map(part => `<div class="seg" style="width:${Math.min(part.pct, 100)}%;background:${partColor(part.key)}"></div>`).join("")}
            </div>
            <div class="row2"><span>${c.label}</span><span>${c.model || ""}</span></div>
          </div>`).join("")}`;
      root.appendChild(card);
    });
    const now = new Date().toLocaleTimeString();
    document.getElementById("foot").textContent = `Updated ${now}`;
  }

  function renderHistory(data) {
    const root = document.getElementById("cards");
    root.innerHTML = "";
    data.periods.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row1">
          <div class="name">${p.label}</div>
          <div class="pct" style="font-size:15px">${p.total_label}</div>
        </div>
        ${p.parts.length ? `
          <div class="ctx-parts">
            ${p.parts.map(part => `<span class="seg-label"><span class="swatch" style="background:${partColor(part.key)}"></span><span style="color:${partColor(part.key)}">${part.key} ${part.pct}%</span></span>`).join("")}
          </div>
          <div class="bar stacked">
            ${p.parts.map(part => `<div class="seg" style="width:${part.pct}%;background:${partColor(part.key)}"></div>`).join("")}
          </div>`
        : `<div class="row2"><span>no usage in this window</span></div>`}`;
      root.appendChild(card);
    });
    document.getElementById("foot").textContent = "Offline · daily / weekly / monthly token usage";
  }

  function renderHeatmap(data) {
    const root = document.getElementById("cards");
    root.innerHTML = "";
    const cols = data.weeks.map(week => `
      <div class="hm-col">
        ${week.map(cell => cell
          ? `<div class="hm-cell hm-l${cell.level}" title="${cell.date} · ${cell.total_label} tokens"></div>`
          : `<div class="hm-cell hm-empty"></div>`).join("")}
      </div>`).join("");
    const hhead = `<div class="hm-hrow"><span class="hm-day"></span>${
      Array.from({length: 24}, (_, h) => `<span class="hm-hlabel">${h % 6 === 0 ? h : ""}</span>`).join("")}</div>`;
    const hrows = (data.hourly ? data.hourly.rows : []).map(row => `
      <div class="hm-hrow"><span class="hm-day">${row.day}</span>${
        row.cells.map(c => `<div class="hm-cell hm-l${c.level}" title="${row.day} ${String(c.hour).padStart(2, "0")}:00 · ${c.total_label} tokens"></div>`).join("")}
      </div>`).join("");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="row1">
        <div class="name">Heatmap</div>
        <div class="pct" style="font-size:13px">${data.total_label} tokens</div>
      </div>
      <div class="ctx-head"><span class="label">Daily · last 12 weeks</span></div>
      <div class="hm-grid">${cols}</div>
      <div class="hm-legend"><span>less</span>
        <span class="hm-cell hm-l0"></span><span class="hm-cell hm-l1"></span>
        <span class="hm-cell hm-l2"></span><span class="hm-cell hm-l3"></span>
        <span class="hm-cell hm-l4"></span><span>more</span>
      </div>
      <div class="ctx-head" style="margin-top:14px"><span class="label">By hour of day</span></div>
      <div class="hm-hours">${hhead}${hrows}</div>`;
    root.appendChild(card);
    document.getElementById("foot").textContent = "Heatmap · daily + hourly token usage";
  }

  async function refresh() {
    try {
      const data = await window.pywebview.api.get_data();
      render(data);
      return data.refresh_seconds || 30;
    } catch (e) {
      document.getElementById("cards").innerHTML =
        `<div class="err">Failed to load data: ${e}</div>`;
      return 30;
    }
  }

  async function refreshHistory() {
    try {
      renderHistory(await window.pywebview.api.get_history());
    } catch (e) {
      document.getElementById("cards").innerHTML =
        `<div class="err">Failed to load history: ${e}</div>`;
    }
  }

  async function refreshHeatmap() {
    try {
      renderHeatmap(await window.pywebview.api.get_heatmap());
    } catch (e) {
      document.getElementById("cards").innerHTML =
        `<div class="err">Failed to load heatmap: ${e}</div>`;
    }
  }

  let mode = "live";
  let timer = null;
  const SNAPSHOTS = { offline: refreshHistory, heatmap: refreshHeatmap };

  async function tick() {
    if (timer) { clearTimeout(timer); timer = null; }
    if (mode === "live") {
      const sec = await refresh();
      if (mode === "live") timer = setTimeout(tick, sec * 1000);
    } else {
      await SNAPSHOTS[mode]();   // offline / heatmap: one snapshot, no polling
    }
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll(".menu-item").forEach(it =>
      it.querySelector(".tick").textContent = it.dataset.mode === m ? "✓" : "");
    tick();
  }

  const menuBtn = document.getElementById("menu-btn");
  const menu = document.getElementById("menu");
  menuBtn.addEventListener("click", e => { e.stopPropagation(); menu.classList.toggle("hidden"); });
  document.addEventListener("click", () => menu.classList.add("hidden"));
  menu.querySelectorAll(".menu-item").forEach(it =>
    it.addEventListener("click", () => { menu.classList.add("hidden"); setMode(it.dataset.mode); }));

  window.addEventListener("pywebviewready", () => setMode("live"));
</script>
</body>
</html>
