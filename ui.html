<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Token Tracker</title>
<style>
  :root {
    --bg: #15151a;
    --card: #1e1e26;
    --card-hover: #24242e;
    --text: #f2f2f5;
    --muted: #8a8a99;
    --track: #2d2d38;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Ubuntu", system-ui, sans-serif;
    padding: 20px;
    -webkit-user-select: none;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .2px; }

  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: background .15s;
  }
  .card:hover { background: var(--card-hover); }

  .row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .name { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 600; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .pct { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }

  .bar { height: 8px; background: var(--track); border-radius: 6px; overflow: hidden; }
  .fill { height: 100%; border-radius: 6px; width: 0; transition: width .4s ease; }

  .row2 {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 11.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .badge {
    font-size: 9.5px; text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 5px; background: var(--track); color: var(--muted);
  }
  .plan {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
    padding: 2px 6px; border-radius: 5px; margin-left: 8px;
    background: rgba(255,255,255,.08); color: var(--muted);
  }
  footer { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 8px; }
  .err { color: #e5645a; font-size: 12px; text-align: center; padding: 20px; }
  .hint { font-size: 10.5px; color: #e0a23c; margin-top: 6px; }
</style>
</head>
<body>
  <header>
    <h1>AI Token Tracker</h1>
  </header>
  <div id="cards"></div>
  <footer id="foot"></footer>

<script>
  function barColor(pct) {
    if (pct >= 90) return "#e5645a";
    if (pct >= 70) return "#e0a23c";
    return "#3ea76f";
  }

  function render(data) {
    const root = document.getElementById("cards");
    root.innerHTML = "";
    data.providers.forEach(p => {
      const pctShown = Math.min(p.pct, 100);
      const plan = p.plan
        ? `<span class="plan">${p.plan.toUpperCase()}</span>` : "";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row1">
          <div class="name"><span class="dot" style="background:${p.color}"></span>${p.name}${plan}</div>
          <div class="pct" style="color:${barColor(p.pct)}">${p.pct}%</div>
        </div>
        <div class="bar"><div class="fill" style="width:${pctShown}%;background:${barColor(p.pct)}"></div></div>
        <div class="row2">
          <span>${p.primary || ""}</span>
          <span>${p.extra || ""}</span>
        </div>
        <div class="row2"><span>${p.sub || ""}</span></div>
        ${p.hint ? `<div class="hint">${p.hint}</div>` : ""}`;
      root.appendChild(card);
    });
    const now = new Date().toLocaleTimeString();
    document.getElementById("foot").textContent = `Updated ${now}`;
  }

  async function refresh() {
    try {
      const data = await window.pywebview.api.get_data();
      render(data);
      return data.refresh_seconds || 30;
    } catch (e) {
      document.getElementById("cards").innerHTML =
        `<div class="err">Failed to load data: ${e}</div>`;
      return 30;
    }
  }

  async function loop() {
    const sec = await refresh();
    setTimeout(loop, sec * 1000);
  }

  window.addEventListener("pywebviewready", loop);
</script>
</body>
</html>
